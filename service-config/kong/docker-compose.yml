##
## Kong docker-compose for fast installation
##

version: "3"

networks:
 scylla-net:
  name: scylla-net
  driver: bridge

services:

  #######################################
  # Postgres: The database used by Kong
  #######################################
  scylla-kong-db:
    container_name: scylla-kong-db
    image: postgres:9.6-alpine
    restart: unless-stopped
    networks:
      - scylla-net
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kongkow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 30s
      timeout: 3s
      retries: 5

  #######################################
  # Kong database migration
  #######################################
  scylla-kong-migration:
    container_name: scylla-kong-migration
    image: kong:3.0.1-alpine
    command: "kong migrations bootstrap"
    networks:
      - scylla-net
    restart: on-failure
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: scylla-kong-db
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongkow
    links:
      - scylla-kong-db
    depends_on:
      - scylla-kong-db

  #######################################
  # Kong: The API Gateway
  #######################################
  scylla-kong:
    container_name: scylla-kong
    image: kong:3.0.1-alpine
    restart: unless-stopped
    networks:
      - scylla-net
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: scylla-kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongkow
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
      KONG_DB_UPDATE_FREQUENCY: 1m
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    depends_on:
      - scylla-kong-migration
    ports:
      - "8001:8001"
      - "8444:8444"
      - "80:8000"
      - "443:8443"

  #######################################
  # Konga database prepare
  #######################################
  scylla-konga-prepare:
    container_name: scylla-konga-prepare
    image: pantsel/konga:latest
    command: "-c prepare -a postgres -u postgresql://kong:kongkow@scylla-kong-db:5432/konga_db"
    networks:
      - scylla-net
    restart: on-failure
    links:
      - scylla-kong-db
    depends_on:
      - scylla-kong-db

  #######################################
  # Konga: Kong GUI
  #######################################
  scylla-konga:
    container_name: scylla-konga
    image: pantsel/konga:latest
    restart: unless-stopped
    networks:
      - scylla-net
    environment:
      DB_ADAPTER: postgres
      DB_HOST: scylla-kong-db
      DB_PORT: 5432 
      DB_USER: kong
      DB_PASSWORD: kongkow
      DB_DATABASE: konga_db
      # any string will OK for token
      TOKEN_SECRET: iu7YDcPLiZkozQXzZ9kka3Ee1Vid5ZgQ
      NODE_ENV: development
    depends_on:
      - scylla-konga-prepare
    ports:
      - "1337:1337"