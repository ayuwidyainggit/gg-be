server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    # use docker.sock to filter containers
    docker_sd_configs:
      - host: "unix:///var/run/docker.sock"
        refresh_interval: 1s
        filters:
          - name: label
            values: ["com.docker.compose.project=scylla"]
    # use container name to create a loki label
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
    pipeline_stages:
      - json:
          expressions:
            status: status
            method: method
      - regex:
          # Use this regex to define log levels based on the `status` field
          expression: '(?P<status_code>2\\d{2}|4\\d{2}|5\\d{2})'
      - template:
          source: status
          template: |
            {{- if (and (eq .status_code "200") (eq .status_code "201")) -}} INFO
            {{- else if (and (ge .status_code "400") (lt .status_code "500")) -}} WARN
            {{- else if (ge .status_code "500") -}} ERROR
            {{- else -}} TRACE
            {{- end -}}
      - labels:
          status: status
          method: method
      - regex:
          # Extract log level from square brackets (e.g., [INFO], [ERROR])
          expression: '.*\\[(?P<level>INFO|ERROR|DEBUG|WARN|TRACE)\\] .*'
      - match:
          selector: '{level=~"INFO|ERROR|DEBUG|WARN|TRACE"}'
          stages:
            - template:
                source: level
                template: |
                  {{- if eq .level "ERROR" -}} CRITICAL
                  {{- else if eq .level "WARN" -}} WARNING
                  {{- else -}} {{ .level }}
                  {{- end -}}
      - labels:
          level: level
