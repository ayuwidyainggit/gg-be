name: CI Build, Push, and Deploy

on:
  push:
    branches:
      - 'demo'
      - 'staging'
      - 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            digdaya/pjp:${{ github.ref_name == 'demo' && 'demo-' || github.ref_name == 'staging' && 'staging-' || 'live-' }}${{ github.sha }}
            digdaya/pjp:${{ github.ref_name == 'demo' && 'demo-latest' || github.ref_name == 'staging' && 'staging-latest' || 'live-latest' }}

  push_to_gitlab:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Push to GitLab (staging)
        if: github.ref == 'refs/heads/staging'
        env:
          GITLAB_TOKEN: glpat-LYJhchiptz4Adn6ubIHWYm86MQp1OjR0YXRnCw.01.120fgqxos
        run: |
          git push --force https://gitlab-ci-token:glpat-LYJhchiptz4Adn6ubIHWYm86MQp1OjR0YXRnCw.01.120fgqxos@gitlab.com/scylla-x/backend/api/ScyllaX-PJP-BE.git staging

      - name: Push to GitLab (demo)
        if: github.ref == 'refs/heads/demo'
        env:
          GITLAB_TOKEN: glpat-LYJhchiptz4Adn6ubIHWYm86MQp1OjR0YXRnCw.01.120fgqxos
        run: |
          git push --force https://gitlab-ci-token:glpat-LYJhchiptz4Adn6ubIHWYm86MQp1OjR0YXRnCw.01.120fgqxos@gitlab.com/scylla-x/backend/api/ScyllaX-PJP-BE.git demo

  deploy_to_demo:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/demo'
    steps:
      - name: Deploy to demo via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 103.28.219.76
          username: root
          port: 22021
          password: ServerRAD@2022
          script: |
              cd /home/jenkins/service-config/scylla-pjp
              docker compose pull && docker compose down && docker compose up -d --build

  deploy_to_production:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 110.239.87.116
          username: root
          port: 22
          password: ScyllaX25_Prathes!s
          script: |
              cd /home/jenkins/service-config/scylla-pjp
              docker compose pull && docker compose down && docker compose up -d --build

  deploy_to_staging:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 103.28.219.73
          username: root
          port: 22021
          password: ServerRAD@2022
          script: |
            cd /home/pratesis/src/service-config/scylla-pjp
            docker compose pull && docker compose down && docker compose up -d --build
