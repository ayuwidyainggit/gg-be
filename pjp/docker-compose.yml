version: '3.8'
services:
  apps:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scylla-pjp
    image: scylla-pjp
    ports:
      - ${PORT}:${PORT}
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      KONG_URL: ${KONG_URL}
    networks:
      - backend

networks:
  backend:
