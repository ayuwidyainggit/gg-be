info:
  contact: {}
  description: ScyllaX-TMS API in Go using Fiber framework
  title: ScyllaX-TMS API
  version: "1.0"
paths:
  /generate/send-pick:
    post:
      description: 'catatan untuk attr outlet_latitude, outlet_longitude, warehouse_latitude,
        warehouse_longitude wajib diisi dgn numeric/integer, contoh : -6.1365484 dan
        gk boleh kosong!!!!!!!!.'
      parameters:
      - description: send pick auto shipment
        in: body
        name: shipment
        required: true
        schema:
          $ref: '#/definitions/entity.CreateShipmentAutoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Data
          schema:
            allOf:
            - $ref: '#/definitions/entity.JsonSuccess'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.SendPickResponse'
                  type: array
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/entity.JsonBadRequest'
        "404":
          description: Data not found
          schema:
            $ref: '#/definitions/entity.JsonNotFound'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/entity.JsonInternalServerError'
      summary: send to sendpick with result shipment_no and order_id
      tags:
      - sendpick(thirdparty)
  /invoices:
    get:
      description: Return list of returns.
      parameters:
      - description: Limit
        in: query
        name: limit
        type: string
      - description: OutletId
        in: query
        name: outlet_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Data
          schema:
            allOf:
            - $ref: '#/definitions/entity.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.CustomShipmentInvoice'
                  type: array
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/entity.JsonBadRequest'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/entity.JsonUnauthorized'
        "404":
          description: Data not found
          schema:
            $ref: '#/definitions/entity.JsonNotFound'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/entity.JsonInternalServerError'
      security:
      - Bearer: []
      summary: Get list of returns.
      tags:
      - invoice
  /login/send-pick:
    post:
      description: login sendpick get token jwt.
      produces:
      - application/json
      responses:
        "200":
          description: Data
          schema:
            allOf:
            - $ref: '#/definitions/entity.JsonSuccess'
            - properties:
                data:
                  type: string
